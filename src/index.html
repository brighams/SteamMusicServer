<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Starkeeper Media</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font: 14px/1.5 monospace; padding: 24px; color: #d8c8f0;
  background: linear-gradient(160deg, #0e0820 0%, #160d30 50%, #0c0618 100%);
  min-height: 100vh;
}
h1 { color: #e8c040; margin-bottom: 12px; font-size: 1.4em; letter-spacing: 2px;
     text-shadow: 0 0 16px rgba(232,192,64,0.35); }
#summary {
  margin-bottom: 20px; color: #b090d8; padding-left: 12px;
  border-left: 3px solid #6030a0;
}
#summary strong { color: #d0a8ff; }

/* ── now playing (deep vivid) ──────────────────────────────────────── */
#now-playing {
  display: none; margin-bottom: 20px; padding: 10px 16px;
  background: linear-gradient(160deg, #1a0035 0%, #2e0055 55%, #180030 100%);
  border-left: 4px solid #c060f0;
  box-shadow: 0 0 24px rgba(160,0,255,0.25), 0 2px 8px rgba(0,0,0,0.6);
  position: sticky; top: 0; z-index: 100;
}
#np-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
#np-album {
  color: #6030a0; font-size: 0.8em; flex-shrink: 0; max-width: 220px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-align: right; margin-left: auto; padding-left: 12px;
}
.np-btn {
  background: rgba(180,0,255,0.08); border: 1px solid #6a28a0; color: #b080d8;
  cursor: pointer; font-size: 0.85em; padding: 2px 8px; border-radius: 3px;
  font-family: inherit; line-height: 1.7; flex-shrink: 0; user-select: none;
  transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
}
.np-btn:hover { border-color: #df60ff; color: #f0c0ff; box-shadow: 0 0 8px rgba(200,60,255,0.4); }
.np-btn.active { background: rgba(200,50,255,0.18); border-color: #e060f8; color: #f080ff;
  box-shadow: 0 0 12px rgba(220,60,255,0.5); }
#np-stop:hover { border-color: #f86090; color: #ff80a8; box-shadow: 0 0 8px rgba(255,60,100,0.35); }
#np-volume { width: 90px; cursor: pointer; flex-shrink: 0; accent-color: #c060f0; vertical-align: middle; opacity: 0.85; }
#np-volume:hover { opacity: 1; }
#np-track { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 10px; padding-left: 8px; border-left: 1px solid #4a1070; }
#np-label { color: #c060f0; font-size: 0.72em; letter-spacing: 2px; text-transform: uppercase;
  flex-shrink: 0; text-shadow: 0 0 8px rgba(180,60,255,0.7); }
#np-filename { color: #f0d8ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.95em; }
#np-tracks { max-height: 200px; overflow-y: auto; scrollbar-color: #7020a0 #0e0020; scrollbar-width: thin; }
#np-tracks::-webkit-scrollbar { width: 6px; }
#np-tracks::-webkit-scrollbar-track { background: #0e0020; }
#np-tracks::-webkit-scrollbar-thumb { background: #7020a0; border-radius: 3px; }
#np-tracks::-webkit-scrollbar-thumb:hover { background: #b040e0; }
#np-tracks table { background: transparent; }
#np-tracks th { color: #6a2090; border-bottom-color: #2a0050; }
#np-tracks td { color: #c8a8e8; }
#np-tracks tr:hover td { background: rgba(140,0,200,0.15); }
#np-tracks tr.playing td { background: rgba(160,0,220,0.25); }
#np-tracks tr.playing .play-btn { color: #e060f8; }

/* ── filter ──────────────────────────────────────────────────────── */
.filter-row { margin-bottom: 20px; }
.filter-row input {
  background: #1a0d30; border: 1px solid #4a2878; color: #d0b8f0;
  padding: 4px 10px; width: 300px; font: inherit; border-radius: 3px;
}
.filter-row input:focus { outline: none; border-color: #c060f0; box-shadow: 0 0 6px rgba(180,60,240,0.3); }
.filter-row input::placeholder { color: #5a3878; }

/* ── section headers ─────────────────────────────────────────────── */
h2 { font-size: 1em; color: #7848b8; letter-spacing: 1px; text-transform: uppercase;
     border-bottom: 1px solid #2a1450; padding-bottom: 6px; margin-bottom: 4px;
     cursor: pointer; user-select: none; }
h2:hover { color: #b070e0; }
h2 small { color: #4a2870; text-transform: none; letter-spacing: 0; margin-left: 8px; font-weight: normal; }
.section-arrow { margin-right: 6px; }
.section { margin-bottom: 32px; }
.section-body.collapsed { display: none; }

/* ── album rows ──────────────────────────────────────────────────── */
.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 4px; cursor: pointer; gap: 16px; border-bottom: 1px solid #1e0e38;
}
.row:hover { background: rgba(120,40,200,0.12); }
.row-name { color: #c090f0; flex: 1; }
.row-meta { color: #5a3878; font-size: 0.85em; flex-shrink: 0; }
.floppy-btn {
  display: none; background: none; border: none; color: #4a2870;
  cursor: pointer; font-size: 1.1em; padding: 0 2px; flex-shrink: 0; line-height: 1;
  transition: color 0.12s;
}
.floppy-btn.loaded { display: block; }
.row:hover .floppy-btn.loaded { color: #c060f0; text-shadow: 0 0 8px rgba(180,60,240,0.6); }
.badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 0.72em; padding: 1px 5px; border-radius: 2px;
  background: #1e0d38; color: #6040a0; letter-spacing: 0.5px;
}
.type-toggle {
  font-size: 0.72em; padding: 1px 5px; border-radius: 2px; letter-spacing: 0.5px;
  cursor: pointer; border: 1px solid #6030a0; background: #1e0d38; color: #c080f0;
  user-select: none; font-family: inherit; transition: border-color 0.1s, color 0.1s;
}
.type-toggle:hover { border-color: #c060f0; color: #e0a8ff; }
.type-toggle.off {
  background: #120830; color: #3a2055; border-color: #1e0d38; text-decoration: line-through;
}

/* ── track panels ────────────────────────────────────────────────── */
.tracks-panel { display: none; padding: 4px 8px 12px 20px; }
.tracks-panel.open { display: block; }
table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
th { color: #5a3080; text-align: left; padding: 3px 8px; border-bottom: 1px solid #2a1050; }
td { padding: 2px 8px; color: #c0a8e0; }
tr:hover td { background: rgba(100,30,160,0.18); }
td a { color: #c090f0; text-decoration: none; }
td a:hover { color: #e8c040; }
.dim { color: #5a3878; }
.msg { color: #4a2870; font-style: italic; padding: 6px 0; display: block; }

.play-col { width: 20px; padding: 2px 2px 2px 4px !important; }
.play-btn {
  visibility: hidden; background: none; border: none;
  color: #9060c0; cursor: pointer; font-size: 0.85em; padding: 0; line-height: 1;
}
tr:hover .play-btn { visibility: visible; }
tr.playing .play-btn { visibility: visible; color: #e060f8; }
tr.playing td { background: rgba(120,0,180,0.2); color: #e8d0ff; }

/* ── scrollbars (track panels) ───────────────────────────────────── */
.tracks-panel { scrollbar-color: #4a1880 #0e0820; scrollbar-width: thin; }
.tracks-panel::-webkit-scrollbar { width: 6px; }
.tracks-panel::-webkit-scrollbar-track { background: #0e0820; }
.tracks-panel::-webkit-scrollbar-thumb { background: #4a1880; border-radius: 3px; }
.tracks-panel::-webkit-scrollbar-thumb:hover { background: #8030c0; }

/* ── rating widget ───────────────────────────────────────────────── */
.rating-widget {
  display: inline-block; cursor: pointer; user-select: none;
  min-width: 32px; text-align: center; position: relative;
  font-size: 1.15em; line-height: 1; vertical-align: middle;
}
.rating-skull { color: #e040b0; }
.rating-empty { color: #4a2870; }
.rating-stars { color: #d890ff; }
.rating-widget:hover .rating-skull { color: #ff70d0; }
.rating-widget:hover .rating-empty { color: #9060c0; }
.rating-widget:hover .rating-stars { color: #f0d0ff; }
.rating-input {
  width: 48px; background: #0e0120; border: 1px solid #d060f8;
  color: #f0d8ff; font-family: inherit; font-size: 0.85em;
  padding: 1px 3px; border-radius: 2px; text-align: center;
}

/* ── rating popup ────────────────────────────────────────────────── */
.rating-popup {
  position: fixed; z-index: 9999;
  display: flex; flex-direction: row; gap: 1px;
  background: #0a0118; border: 1px solid #d060f8;
  border-radius: 6px; padding: 5px 6px;
  box-shadow: 0 0 28px rgba(200,60,255,0.55), 0 4px 20px rgba(0,0,0,0.95);
}
.rp-opt {
  padding: 5px 9px; border-radius: 4px; cursor: pointer;
  user-select: none; white-space: nowrap;
  transition: background 0.08s, color 0.08s;
}
.rp-skull { color: #e040b0; font-size: 1.2em; }
.rp-skull:hover { color: #ff70d0; background: rgba(220,0,120,0.28); }
.rp-clear { color: #5a3888; font-size: 1.15em; }
.rp-clear:hover { color: #a870e0; background: rgba(160,80,240,0.18); }
.rp-star { color: #d890ff; font-size: 1.1em; letter-spacing: -1px; }
.rp-star:hover { color: #f8e0ff; background: rgba(200,100,255,0.2); }
.rp-opt.rp-active { background: rgba(180,60,240,0.3); }

/* ── play count ──────────────────────────────────────────────────── */
.play-count { color: #4a2870; font-size: 0.82em; }
.album-plays { color: #4a2870; font-size: 0.78em; flex-shrink: 0; }

/* ── banned tracks ───────────────────────────────────────────────── */
tr.banned-track td { color: #3a2050 !important; }
tr.banned-track .play-btn { color: #3a2050 !important; }
tr.banned-track:hover td { background: rgba(80,0,40,0.12); color: #5a3068 !important; }

/* ── banned albums ───────────────────────────────────────────────── */
.banned-album > .row { opacity: 0.38; }
.banned-album > .row:hover { opacity: 0.6; }
.banned-section-hdr {
  color: #3a1848; font-size: 0.7em; letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 4px 4px; border-top: 1px solid #1e0830; margin-top: 6px;
}
</style>
</head>
<body>
<h1>⭐ STARKEEPER MEDIA</h1>
<div id="summary" class="msg">loading…</div>

<audio id="audio-player"></audio>

<div id="now-playing">
  <div id="np-bar">
    <button class="np-btn" id="np-play"   onclick="togglePlayPause()" title="Play / Pause">▶</button>
    <button class="np-btn" id="np-stop"   onclick="stopPlayback()"    title="Stop">■</button>
    <button class="np-btn" id="np-skip"   onclick="skipTrack()"       title="Skip">⏭</button>
    <button class="np-btn" id="np-random" onclick="toggleRandom()"    title="Random mode">🎲</button>
    <input  id="np-volume" type="range" min="0" max="1" step="0.01" value="1"
            oninput="AUDIO.volume=this.value" title="Volume">
    <div id="np-track">
      <span id="np-label">Now Playing</span>
      <span id="np-filename">—</span>
    </div>
    <span id="np-album"></span>
  </div>
  <div id="np-tracks"></div>
</div>

<div class="filter-row">
  <input id="search" type="text" placeholder="filter by name…" oninput="filterAll(this.value)">
</div>

<div class="section">
  <h2 onclick="toggleSection(this)"><span class="section-arrow">▾</span>Sound Tracks <small id="st-count"></small></h2>
  <div id="soundtracks" class="section-body"><span class="msg">loading…</span></div>
</div>

<div class="section">
  <h2 onclick="toggleSection(this)"><span class="section-arrow">▾</span>Discovered Media <small id="dm-count"></small></h2>
  <div id="media" class="section-body"><span class="msg">loading…</span></div>
</div>

<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── rating helpers ────────────────────────────────────────────────────────────

const SHOW_PATHS = new URLSearchParams(window.location.search).has('show_paths')

const RATING_HOLD_MS = 380

const POPUP_OPTS = [
  { cls: 'rp-skull', icon: '☠',     value: -1   },
  { cls: 'rp-clear', icon: '☆',     value: 0    },
  { cls: 'rp-star',  icon: '★',     value: 200  },
  { cls: 'rp-star',  icon: '★★',    value: 400  },
  { cls: 'rp-star',  icon: '★★★',   value: 600  },
  { cls: 'rp-star',  icon: '★★★★',  value: 800  },
  { cls: 'rp-star',  icon: '★★★★★', value: 1000 },
]

const rating_icon = (n) => {
  if (n < 0)   return `<span class="rating-skull">☠</span>`
  if (n === 0) return `<span class="rating-empty">☆</span>`
  const stars = n <= 333 ? '★' : n <= 666 ? '★★' : '★★★'
  return `<span class="rating-stars">${stars}</span>`
}

const rating_widget_html = (key, kind, rating) =>
  `<span class="rating-widget" data-key="${esc(key)}" data-kind="${esc(kind)}" data-rating="${rating}"
    onmousedown="ratingMouseDown(event,this)" onmouseup="ratingMouseUp(event,this)"
    ondblclick="ratingDblClick(event,this)">${rating_icon(rating)}</span>`

const applyRating = async (el, val) => {
  el.dataset.rating = val
  el.innerHTML = rating_icon(val)
  await fetch('/api/rating', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key: el.dataset.key, rating: val, kind: el.dataset.kind})
  }).catch(() => {})
  if (el.dataset.kind === 'track') {
    el.closest('tr')?.classList.toggle('banned-track', val < 0)
  } else {
    el.closest('.album-entry')?.classList.toggle('banned-album', val < 0)
  }
}

let _ratingPopup = null

const closeRatingPopup = () => {
  if (_ratingPopup) { _ratingPopup.remove(); _ratingPopup = null }
  document.removeEventListener('pointerdown', _popupOutside)
  document.removeEventListener('keydown', _popupKey)
}

const _popupOutside = (e) => {
  if (_ratingPopup && !_ratingPopup.contains(e.target)) closeRatingPopup()
}

const _popupKey = (e) => {
  if (e.key === 'Escape') closeRatingPopup()
}

const showRatingPopup = (widget) => {
  closeRatingPopup()
  const cur = parseInt(widget.dataset.rating) || 0
  const popup = document.createElement('div')
  popup.className = 'rating-popup'

  for (const o of POPUP_OPTS) {
    const opt = document.createElement('div')
    const active = o.value === cur ? ' rp-active' : ''
    opt.className = `rp-opt ${o.cls}${active}`
    opt.textContent = o.icon
    opt.dataset.value = o.value
    popup.appendChild(opt)
  }

  popup.addEventListener('click', (e) => {
    const opt = e.target.closest('.rp-opt')
    if (!opt) return
    e.stopPropagation()
    applyRating(widget, parseInt(opt.dataset.value))
    closeRatingPopup()
  })

  const rect = widget.getBoundingClientRect()
  const popupW = POPUP_OPTS.length * 46
  const left = Math.min(rect.left, window.innerWidth - popupW - 8)
  popup.style.left = Math.max(4, left) + 'px'
  popup.style.top  = (rect.bottom + 6) + 'px'
  document.body.appendChild(popup)
  _ratingPopup = popup

  setTimeout(() => {
    document.addEventListener('pointerdown', _popupOutside)
    document.addEventListener('keydown', _popupKey)
  }, 0)
}

const ratingMouseDown = (evt, el) => {
  if (evt.button !== 0) return
  evt.preventDefault(); evt.stopPropagation()
  el._holdTimer = setTimeout(() => { el._holdTimer = null; showRatingPopup(el) }, RATING_HOLD_MS)
}

const ratingMouseUp = (evt, el) => {
  if (el._holdTimer) { clearTimeout(el._holdTimer); el._holdTimer = null }
}

const ratingDblClick = (evt, el) => {
  evt.stopPropagation()
  if (el._holdTimer) { clearTimeout(el._holdTimer); el._holdTimer = null }
  closeRatingPopup()
  const cur = parseInt(el.dataset.rating) || 0
  const inp = document.createElement('input')
  inp.type = 'number'; inp.min = '-1'; inp.max = '1000'
  inp.value = cur; inp.className = 'rating-input'
  el.innerHTML = ''; el.appendChild(inp)
  inp.focus(); inp.select()

  let done = false
  const commit = async () => {
    if (done) return; done = true
    const raw = inp.value.trim()
    const val = raw === '' ? 0 : Math.max(-1, Math.min(1000, parseInt(raw) || 0))
    await applyRating(el, val)
  }
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') inp.blur()
    if (e.key === 'Escape') { done = true; e.stopPropagation(); el.innerHTML = rating_icon(cur) }
  })
  inp.addEventListener('blur', commit)
}

// ── player ────────────────────────────────────────────────────────────────────

const AUDIO = document.getElementById('audio-player')
const player = { albumId: null, tracks: [], urlFn: null, idx: -1 }
let randomMode = false
let ALL_ST_ALBUMS = []
let ALL_DM_ALBUMS = []

AUDIO.onplay  = () => { document.getElementById('np-play').textContent = '⏸' }
AUDIO.onpause = () => { document.getElementById('np-play').textContent = '▶' }
AUDIO.onended = () => {
  if (randomMode) {
    playRandom()
  } else if (player.idx + 1 < player.tracks.length) {
    playIdx(player.idx + 1)
  }
}

const playIdx = (idx) => {
  player.idx = idx
  AUDIO.src = player.urlFn(player.tracks[idx])
  AUDIO.play()
  refreshNowPlaying()
  refreshHighlight()
}

const playFrom = (albumId, fileId) => {
  const reg = TRACK_REG[albumId]
  if (!reg) return
  const filtered = reg.tracks.filter(t => !isTypeOff(albumId, t.media_type) && (t.rating ?? 0) >= 0)
  const idx = filtered.findIndex(t => t.file_id === fileId)
  if (idx < 0) return
  player.albumId = albumId
  player.tracks  = filtered
  player.urlFn   = reg.urlFn
  playIdx(idx)
}

const stopPlayback = () => {
  AUDIO.pause()
  AUDIO.src = ''
  player.albumId = null
  player.tracks  = []
  player.idx     = -1
  document.getElementById('now-playing').style.display = 'none'
  refreshHighlight()
}

const skipTrack = () => {
  if (randomMode) {
    playRandom()
  } else if (player.idx + 1 < player.tracks.length) {
    playIdx(player.idx + 1)
  }
}

const togglePlayPause = () => {
  if (AUDIO.paused) { AUDIO.play() } else { AUDIO.pause() }
}


const toggleRandom = () => {
  randomMode = !randomMode
  document.getElementById('np-random').classList.toggle('active', randomMode)
}

const playRandom = async () => {
  const pool = [...ALL_ST_ALBUMS, ...ALL_DM_ALBUMS].filter(a => (a.album_rating ?? 0) >= 0)
  if (!pool.length) return
  const album = pool[Math.floor(Math.random() * pool.length)]
  const scanType = ALL_ST_ALBUMS.includes(album) ? 'music' : 'files'
  const prefix = scanType === 'music' ? 'st' : 'dm'
  const albumId = prefix + '_' + encodeURIComponent(album.title).replace(/'/g, '%27')
  const urlFn = t => `/media/${t.file_id}`
  const tracks = await fetch(`/api/album/tracks?title=${encodeURIComponent(album.title)}&scan_type=${scanType}`).then(r => r.json())
  if (!tracks.length) return
  const types = [...new Set(tracks.map(t => t.media_type).filter(Boolean))].sort()
  if (!TRACK_REG[albumId]) {
    TRACK_REG[albumId] = { tracks, urlFn, allTypes: types, title: album.title, scanType }
  }
  const filtered = tracks.filter(t => !isTypeOff(albumId, t.media_type) && (t.rating ?? 0) >= 0)
  const queue = filtered.length ? filtered : tracks.filter(t => (t.rating ?? 0) >= 0)
  if (!queue.length) return
  player.albumId = albumId
  player.tracks  = queue
  player.urlFn   = urlFn
  playIdx(Math.floor(Math.random() * queue.length))
}

const playBtnClick = (btn) => {
  if (btn.dataset.queueIdx !== undefined) {
    playIdx(parseInt(btn.dataset.queueIdx))
    return
  }
  const albumId = btn.dataset.albumId
  const fileId  = parseInt(btn.dataset.fileId)
  const reg     = TRACK_REG[albumId]
  if (!reg) return
  const track = reg.tracks.find(t => t.file_id === fileId)
  if (track && (track.rating ?? 0) < 0) {
    AUDIO.src = reg.urlFn(track)
    AUDIO.play()
    document.getElementById('now-playing').style.display = 'block'
    document.getElementById('np-filename').textContent = track.file_name
    return
  }
  playFrom(albumId, fileId)
}

// ── section collapse ──────────────────────────────────────────────────────────

const toggleSection = (h2) => {
  const body = h2.nextElementSibling
  const collapsed = body.classList.toggle('collapsed')
  h2.querySelector('.section-arrow').textContent = collapsed ? '▸' : '▾'
}

// ── track registry & type filters ────────────────────────────────────────────

let TYPE_ORDER = []  // lowercase, config priority order

const TRACK_REG = {}  // albumId -> { tracks, urlFn, allTypes, title, scanType }
const TYPE_OFF  = {}  // albumId -> Set<type>

const isTypeOff = (albumId, type) => !!(TYPE_OFF[albumId] && TYPE_OFF[albumId].has(type))

const typeToggleClick = (evt, albumId, type, btn) => {
  evt.stopPropagation()
  if (!TYPE_OFF[albumId]) TYPE_OFF[albumId] = new Set()
  if (TYPE_OFF[albumId].has(type)) {
    TYPE_OFF[albumId].delete(type)
    btn.className = 'type-toggle'
  } else {
    TYPE_OFF[albumId].add(type)
    btn.className = 'type-toggle off'
  }
  filterTypeRows(albumId)
  if (player.albumId === albumId && TRACK_REG[albumId]) {
    const cur = player.tracks[player.idx]
    player.tracks = TRACK_REG[albumId].tracks.filter(t => !isTypeOff(albumId, t.media_type) && (t.rating ?? 0) >= 0)
    player.idx = cur ? player.tracks.findIndex(t => t.file_id === cur.file_id) : -1
    refreshNowPlaying()
  }
}

const floppyClick = (evt, btn) => {
  evt.stopPropagation()
  const albumId = btn.dataset.albumId
  const reg = TRACK_REG[albumId]
  if (!reg) return
  const active = reg.tracks.filter(t => !isTypeOff(albumId, t.media_type))
  if (!active.length) return
  const activeTypes = [...new Set(active.map(t => t.media_type))].sort()
  const typeSuffix = activeTypes.length === reg.allTypes.length ? 'all' : activeTypes.join('-')
  const tracks = active.map(t =>
    `    <track>\n      <location>file://${t.full_path.replace(/ /g, '%20')}</location>\n      <title>${esc(t.file_name)}</title>\n    </track>`
  ).join('\n')
  const xspf = `<?xml version="1.0" encoding="UTF-8"?>\n<playlist version="1" xmlns="http://xspf.org/ns/0/">\n  <trackList>\n${tracks}\n  </trackList>\n</playlist>`
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([xspf], { type: 'application/xspf+xml' }))
  a.download = `${reg.title}-${typeSuffix}-vlc-playlist.xspf`
  a.click()
}

const filterTypeRows = (albumId) => {
  const panel = document.getElementById('tp-' + albumId)
  if (!panel) return
  for (const tr of panel.querySelectorAll('tr[data-type]')) {
    tr.style.display = isTypeOff(albumId, tr.dataset.type) ? 'none' : ''
  }
}

// ── now playing bar ───────────────────────────────────────────────────────────

const refreshNowPlaying = () => {
  const bar = document.getElementById('now-playing')
  if (player.idx < 0 || !player.tracks.length) { bar.style.display = 'none'; return }
  bar.style.display = 'block'
  const t = player.tracks[player.idx]
  document.getElementById('np-filename').textContent = t.file_name
  document.getElementById('np-album').textContent = t.title || TRACK_REG[player.albumId]?.title || ''
  document.getElementById('np-tracks').innerHTML = tracksTable(player.tracks, player.urlFn, null, true)
  refreshHighlight()
}

const refreshHighlight = () => {
  const curUrl = player.idx >= 0 && player.urlFn ? player.urlFn(player.tracks[player.idx]) : null
  for (const tr of document.querySelectorAll('tr[data-url]')) {
    tr.classList.toggle('playing', tr.dataset.url === curUrl)
  }
}

// ── track table ───────────────────────────────────────────────────────────────

const tracksTable = (tracks, urlFn, albumId, fromQueue) => {
  if (!tracks.length) return '<span class="msg">no tracks found</span>'
  const rows = tracks.map((t, i) => {
    const url     = urlFn(t)
    const kb      = t.size ? (t.size / 1024).toFixed(0) + ' KB' : ''
    const plays   = t.play_count > 0 ? t.play_count : ''
    const rating  = t.rating ?? 0
    const hidden  = !fromQueue && albumId && isTypeOff(albumId, t.media_type) ? ' style="display:none"' : ''
    const btnData = fromQueue
      ? `data-queue-idx="${i}"`
      : `data-album-id="${esc(albumId)}" data-file-id="${t.file_id}"`
    const bannedCls = rating < 0 ? ' banned-track' : ''
    const ratingCol = fromQueue ? '' : `<td>${rating_widget_html(t.join_key || '', 'track', rating)}</td>`
    const pathCol   = SHOW_PATHS ? `<td class="dim">${esc(t.full_path)}</td>` : ''
    return `<tr data-type="${esc(t.media_type)}" data-url="${esc(url)}"${hidden} class="${bannedCls}">
      <td class="play-col"><button class="play-btn" ${btnData} onclick="playBtnClick(this)">▶</button></td>
      <td>${esc(t.file_name)}</td>
      <td class="play-count">${plays}</td>
      <td class="dim">${esc(kb)}</td>
      ${ratingCol}
      <td><span class="badge">${esc(t.media_type)}</span></td>
      ${pathCol}
    </tr>`
  }).join('')
  const ratingTh = fromQueue ? '' : '<th></th>'
  const pathTh   = SHOW_PATHS ? '<th>path</th>' : ''
  return `<table><tr><th></th><th>file</th><th>plays</th><th>size</th>${ratingTh}<th>type</th>${pathTh}</tr>${rows}</table>`
}

// ── page build ────────────────────────────────────────────────────────────────

async function load() {
  const [sumRes, stRes, dmRes] = await Promise.all([
    fetch('/api/summary'),
    fetch('/api/albums?scan_type=music'),
    fetch('/api/albums?scan_type=files'),
  ])
  const sum    = await sumRes.json()
  const stList = await stRes.json()
  const dmList = await dmRes.json()

  TYPE_ORDER = (sum.media_type_order || [])
  ALL_ST_ALBUMS = stList
  ALL_DM_ALBUMS = dmList

  const byTypeMap = Object.fromEntries((sum.by_type || []).map(r => [r.media_type.toUpperCase(), r.count]))
  const orderedKeys = TYPE_ORDER.map(t => t.toUpperCase()).filter(t => byTypeMap[t])
  const extraKeys = Object.keys(byTypeMap).filter(t => !orderedKeys.includes(t))
  const parts = [...orderedKeys, ...extraKeys].map(t =>
    `<strong>${byTypeMap[t].toLocaleString()}</strong>&thinsp;${t}`
  )
  document.getElementById('summary').innerHTML =
    `<strong>${sum.total.toLocaleString()}</strong> files &nbsp;·&nbsp; ` + parts.join(' &nbsp;·&nbsp; ')
    + ` &nbsp;|&nbsp; <strong>${(sum.soundtracks||0).toLocaleString()}</strong> sound tracks`
    + ` &nbsp;·&nbsp; <strong>${(sum.discovered||0).toLocaleString()}</strong> media collections`

  document.getElementById('st-count').textContent = `${stList.length.toLocaleString()} titles`
  document.getElementById('dm-count').textContent = `${dmList.length.toLocaleString()} collections`

  buildAlbums(stList, 'soundtracks', 'music', 'st')
  buildAlbums(dmList, 'media', 'files', 'dm')
}

const initTypeDefaults = (albumId, types) => {
  if (types.length <= 1) return
  if (!TYPE_OFF[albumId]) TYPE_OFF[albumId] = new Set()
  const priority = TYPE_ORDER.map(t => t.toUpperCase())
  const bestType = priority.find(t => types.includes(t)) || types[0]
  for (const t of types) {
    if (t !== bestType) TYPE_OFF[albumId].add(t)
  }
}

function buildAlbumEntry(a, scanType, prefix) {
  const types = (a.types || '').split(',').filter(Boolean).sort()
  const id    = prefix + '_' + encodeURIComponent(a.title).replace(/'/g, '%27')

  initTypeDefaults(id, types)

  const div = document.createElement('div')
  div.className    = 'album-entry'
  div.dataset.name = (a.title || '').toLowerCase()

  const badgesHtml = types.map(t => {
    const off = isTypeOff(id, t) ? ' off' : ''
    return `<button class="type-toggle${off}" onclick="typeToggleClick(event,'${id}','${esc(t)}',this)">${esc(t)}</button>`
  }).join('')

  const floppyHtml = `<button class="floppy-btn" id="fl-${esc(id)}" data-album-id="${esc(id)}" onclick="floppyClick(event,this)" title="Save VLC playlist">💾</button>`

  const albumKey    = a.album_key || ''
  const albumRating = a.album_rating ?? 0
  const plays       = a.album_play_count > 0 ? `<span class="album-plays">${a.album_play_count.toLocaleString()} plays</span>` : ''

  div.innerHTML = `
    <div class="row" data-title="${esc(a.title)}" data-scan-type="${esc(scanType)}" data-id="${esc(id)}" onclick="toggleAlbum(this)">
      <span class="row-name">${esc(a.title)}</span>
      <div class="badges">${badgesHtml}</div>
      ${plays}
      <span class="row-meta">${(a.track_count||0).toLocaleString()} files</span>
      ${rating_widget_html(albumKey, 'album', albumRating)}
      ${floppyHtml}
    </div>
    <div class="tracks-panel" id="tp-${esc(id)}"><span class="msg">loading…</span></div>`

  if (albumRating < 0) div.classList.add('banned-album')
  return div
}

function buildAlbums(albums, containerId, scanType, prefix) {
  const el = document.getElementById(containerId)
  if (!albums.length) { el.innerHTML = '<span class="msg">none found</span>'; return }
  el.innerHTML = ''

  const normal = albums
    .filter(a => (a.album_rating ?? 0) >= 0)
    .sort((a, b) => {
      const rd = (b.album_rating ?? 0) - (a.album_rating ?? 0)
      return rd !== 0 ? rd : (a.title || '').localeCompare(b.title || '')
    })
  const banned = albums
    .filter(a => (a.album_rating ?? 0) < 0)
    .sort((a, b) => (a.title || '').localeCompare(b.title || ''))

  for (const a of normal) el.appendChild(buildAlbumEntry(a, scanType, prefix))

  if (banned.length) {
    const hdr = document.createElement('div')
    hdr.className = 'banned-section-hdr'
    hdr.textContent = '── banned · not in rotation ──'
    el.appendChild(hdr)
    for (const a of banned) el.appendChild(buildAlbumEntry(a, scanType, prefix))
  }
}

async function toggleAlbum(row) {
  const title    = row.dataset.title
  const scanType = row.dataset.scanType
  const id       = row.dataset.id
  const panel    = document.getElementById('tp-' + id)
  const open     = panel.classList.toggle('open')
  if (!open || panel.dataset.loaded) return
  panel.dataset.loaded = '1'

  const urlFn  = t => `/media/${t.file_id}`
  const base   = `/api/album/tracks?title=${encodeURIComponent(title)}&scan_type=${scanType}`
  const tracks = await fetch(base).then(r => r.json())
  const types  = [...new Set(tracks.map(t => t.media_type).filter(Boolean))].sort()

  TRACK_REG[id] = { tracks, urlFn, allTypes: types, title, scanType }

  document.getElementById('fl-' + id)?.classList.add('loaded')
  panel.innerHTML = tracksTable(tracks, urlFn, id, false)
  refreshHighlight()
}

function filterAll(q) {
  const term = q.toLowerCase()
  for (const div of document.querySelectorAll('.album-entry')) {
    div.style.display = !term || div.dataset.name.includes(term) ? '' : 'none'
  }
}

load().catch(e => {
  document.getElementById('summary').textContent = 'Error: ' + e
})
</script>
