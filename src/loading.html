<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Starkeeper Music Tower — Scanning</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font: 14px/1.5 monospace; color: #d8c8f0;
  background: linear-gradient(160deg, #0e0820 0%, #160d30 50%, #0c0618 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
h1 {
  color: #e8c040; font-size: 2em; letter-spacing: 4px; margin-bottom: 48px;
  text-shadow: 0 0 24px rgba(232,192,64,0.5);
}
.logo-wrap {
  position: relative; display: inline-block; margin-bottom: 40px;
  border-radius: 8px;
}
.logo-wrap img {
  display: block; height: 320px; width: auto;
}

.ring {
  width: 800px; height: 800px; border-radius: 50%;
  border: 2px solid #6030a0;
  position: absolute;
  left: calc(50% - 400px);
  top: 50%; transform: translateY(-50%);
  animation: pulse 0.66s ease-in-out infinite;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(160,0,255,0.45); border-color: #6030a0; }
  50%  { box-shadow: 0 0 0 26px rgba(160,0,255,0);  border-color: #c060f0; }
  100% { box-shadow: 0 0 0 0 rgba(160,0,255,0);     border-color: #6030a0; }
}
.msg {
  color: #b090d8; letter-spacing: 2px; text-transform: uppercase;
  font-size: 0.9em; text-align: center; margin-bottom: 28px;
}
.dots { display: inline-block; width: 1.8em; text-align: left; }
.status { color: #4a2870; font-size: 0.78em; letter-spacing: 1px; }
</style>
</head>
<body>
<h1>STARKEEPER MUSIC TOWER</h1>

<div class="logo-wrap">
  <img src="logo.svg">
  <div class="ring"></div>
</div>

<div class="msg">scanning games for music, effects, and voice tracks<span class="dots" id="d"></span></div>
<div class="status" id="s">initializing…</div>
<div class="status" id="ss" style="margin-top:6px">shaders: waiting…</div>
<script>
let n = 0
setInterval(() => { document.getElementById('d').textContent = '.'.repeat((++n % 3) + 1) }, 500)
const poll = async () => {
  try {
    const r = await fetch('/api/status')
    const j = await r.json()
    if (!j.scanning) {
      document.getElementById('s').textContent = 'scan complete — loading…'
      document.getElementById('d').textContent = ''
      setTimeout(() => { window.location.reload() }, 800)
      return
    }
    document.getElementById('s').textContent = 'scanning…'
  } catch (_) {}
  setTimeout(poll, 1000)
}
poll()

const poll_shaders = async () => {
  try {
    const r = await fetch('/api/shader-status')
    const j = await r.json()
    if (j.ready) {
      document.getElementById('ss').textContent = `shaders: ready (${j.total})`
      return
    }
    document.getElementById('ss').textContent = `shaders: building… (${j.total || 0})`
  } catch (_) {}
  setTimeout(poll_shaders, 1500)
}
poll_shaders()
</script>
</body>
</html>
