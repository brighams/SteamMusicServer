name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: music_server
            archive: music_server-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: music_server.exe
            archive: music_server-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: music_server
            archive: music_server-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/config
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp config/scanner_conf.yaml dist/config/
          cd dist && zip -r ../${{ matrix.archive }}.zip .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/config | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Copy-Item "config/scanner_conf.yaml" dist/config/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.zip
